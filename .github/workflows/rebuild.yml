name: Rebuild calendar

on:
  schedule:
    # 03:00 UTC daily ≈ 04:00 CET / 05:00 CEST Berlin
    - cron: '0 3 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'projects/momEvents/config/**'
      - '.github/workflows/**'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild events.html
        run: python tools/rebuild_calendar.py --verbose

      - name: Stage for deploy
        run: |
          mkdir -p _deploy
          cp projects/momEvents/.tmp/events.html _deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          force_orphan: true
          commit_message: 'Auto-update calendar (${{ github.event_name }})'
