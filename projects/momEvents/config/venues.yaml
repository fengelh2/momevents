  bearer_token: "$2y$10$kZQ3wBiSXci74W7d4DEO/.OF9eaLwCvNYCvj94i00O89NaegbGy5W"
  element: eventdmt
  referer: https://www.visitduesseldorf.de/
  page_size: 100
  max_pages: 25
  notes: |
    Stadt Düsseldorf's events portal. The customer-facing /veranstaltungen
    page caps at 30 highlight teasers — the underlying Toubiz JSON API at
    mein.toubiz.de/api/v1/eventDates exposes the full programme (~1000
    future event dates). Bearer token is the widget's anon API key,
    extracted from the page bundle (long-lived; re-probe if it stops
    returning 200).

    The eventdmt element + clientIncludingManaged=current filter scopes
    to Düsseldorf Marketing's curated set. Cultural categories
    (Konzert/Klassik/Jazz/Ausstellung/Theater/Oper/Ballett/Vortrag/
    Lesung/etc.) pass through _TOUBIZ_CATEGORY_MAP; tourism/markets/
    sport/karneval drop via deny-list. Venue names come from
    locationData.address.name when present; events without a venue
    address roll up under the visit-duesseldorf chip.

