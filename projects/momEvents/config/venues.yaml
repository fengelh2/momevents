# Lichtburg Filmpalast Sonderveranstaltungen — gala screenings, cabaret, Bühne.
# We pick up the SPECIAL programme (61 cards), not the daily film schedule.
- id: lichtburg-essen
  name: Lichtburg Essen (Sonderveranstaltungen)
  city: Essen
  category: mixed
  homepage: https://filmspiegel-essen.de/kinos/lichtburg/
  calendar_url: https://filmspiegel-essen.de/kinos/lichtburg/
  kind: html_list
  source_priority: 0
  selectors:
    item: "div.box.event"
    title: "h3.event-title"
    date: "span.event-day"
    detail_link: "a.box-link"
  skip_if_title_matches:
    # Filter movie / special-screening items from the listing — mum wants
    # the cabaret / Bühne / Lesung programme, not Quentin Tarantino in 70mm.
    # German cinema version notation:
    - '(?i)\b(?:OmU|OmeU|OV|OF|OVdt|OmdU)\b'
    # Film stock format markers:
    - '\b\d{2,3}\s*mm\b'
    # Parenthetical "(engl. ...)" indicating film language:
    - '(?i)\(engl\.'
  notes: |
    Original lichtburg-essen.de domain has a broken TLS handshake; the active
    venue page is on filmspiegel-essen.de (the operating company). The page
    mixes ~20 live events (cabaret, Lesungen, Bühne) and ~40 special movie
    screenings; skip_if_title_matches drops the latter. Some movies without
    OmU/OV markers (e.g. plain "Top Gun") will slip through — accept as noise.

