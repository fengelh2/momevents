# momEvents — venue master list
#
# Each entry is one source. A house that runs multiple stages (TUP, Wuppertaler Bühnen)
# is ONE source row but produces multiple venue_id rows downstream via the
# `produces_venue_ids:` key.
#
# Fields:
#   id                   slug, unique. Used as venue_id when produces_venue_ids: is absent.
#   name                 display name
#   city                 one of: Essen, Düsseldorf, Duisburg, Bochum, Dortmund,
#                        Mülheim a.d. Ruhr, Oberhausen, Gelsenkirchen, Wuppertal,
#                        Krefeld, Neuss
#   category             default category if events don't carry one:
#                        museum_exhibition | opera | ballet | concert | theatre |
#                        vernissage | mixed
#   homepage             venue homepage
#   calendar_url         the page to scrape (Spielplan / Programm / Veranstaltungen / Ausstellungen)
#   kind                 ical | json_ld | html_list | unknown   (start at unknown — set during onboarding)
#   source_priority      int, lower is more authoritative for dedup tiebreaks (0 = venue's own site)
#   produces_venue_ids   optional list — split a multi-stage source into multiple ids
#   selectors            optional dict — only filled in when kind = html_list
#   ical_pattern         optional regex — only filled in when kind = ical
#   requires_js          bool, default false — flip to true only if Playwright is needed
#   notes                free text
#
# Status: scaffolded 2026-05-09. NO selectors filled in yet — onboarding workflow will
# probe each one and update this file in place.

# ============================================================================
# ESSEN
# ============================================================================

- id: tup-essen
  name: Theater und Philharmonie Essen (Aalto / Grillo / Philharmonie)
  display_name: TUP Essen
  city: Essen
  category: mixed
  homepage: https://www.theater-essen.de
  calendar_url: https://www.theater-essen.de/programm/kalender/
  kind: ical          # confirmed 2026-05-09: 155 per-event .ics URLs on listing
  source_priority: 0
  produces_venue_ids:
    - aalto-essen           # opera + ballet
    - grillo-essen          # drama
    - philharmonie-essen    # philharmonic / concerts
  ical_pattern: '/kalender-eintrag/\d+/ical-\d{4}-\d{2}-\d{2}-\d+\.ics'
  # Detail-page URLs live at a different path than the .ics endpoints.
  # Named capture group `id` lets the scraper match each .ics by event ID.
  detail_pattern: '/programm/kalender/[^"/]+/(?P<id>\d+)/'
  category_keyword_overrides:
    # Aalto Ballett productions, sourced from /ballett/ — these override the
    # stage_default of "opera" and route to the ballet pill. Refresh each season.
    # ("Carmen" deliberately omitted — both opera AND ballet under that name run
    #  at Aalto in 2025/26; no way to distinguish from .ics alone.)
    ballet:
      - Relations
      - Ptah VI
      - Tanzhommage
  stage_resolver:
    - match: ["Aalto"]
      venue_id: aalto-essen
      venue_name: "Aalto-Theater"
      city: Essen
      default_category: opera          # Aalto = opera + ballet; ballet titles override above
    - match: ["Grillo", "Casa", "Box (Grillo)", "Café Central", "Heldenbar"]
      venue_id: grillo-essen
      venue_name: "Grillo-Theater"
      city: Essen
      default_category: theatre
    - match: ["Alfried Krupp", "Philharmonie", "RWE Pavillon", "Kammermusik", "NATIONAL-BANK Pavillon", "Vorplatz Huyssenallee"]
      venue_id: philharmonie-essen
      venue_name: "Philharmonie Essen"
      city: Essen
      default_category: concert
  skip_if_location_matches:
    # Touring engagements outside Essen — production exists but plays elsewhere.
    - "(?i)^Gastspiel"
    - "(?i)Recklinghausen"
    - "(?i)Berlin$"
    - "(?i)Bochum$"
  notes: |
    TYPO3 spiritec calendar module. First confirmed .ics-publishing source —
    try other NRW theatres on the same module.
    Tour engagements (LOCATION matching skip_if_location_matches) are dropped
    so the calendar stays focused on what mum can actually attend in Essen.
    Stage_resolver expanded 2026-05-10 with NATIONAL-BANK Pavillon and
    Vorplatz Huyssenallee after fall-through audit found 44/152 unmatched.

