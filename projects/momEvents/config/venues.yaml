- id: ruhr-museum
  name: Ruhr Museum (Zollverein)
  city: Essen
  category: museum_exhibition
  homepage: https://ruhrmuseum.de
  calendar_url: https://ruhrmuseum.de/kalender
  kind: html_list
  source_priority: 0
  selectors:
    item: ".card-vertical"
    title: "h3.card-title"
    detail_link: "a"
  date_from_title: true
  accept_drop_rate: 0.5       # permanent-collection cards have no closing date
  notes: |
    Custom CMS. Exhibition entries cram title + venue + closing-date phrase
    into <h3.card-title>; we extract "Bis 10. Januar 2027" via regex from the
    title and treat the rest as the title (first line). Permanent-collection
    entries have no closing date and are dropped (legit, hence accept_drop_rate).

# Ruhr Museum's full programme (tours, lectures like the Sven Plöger climate
# talk, family events) lives on a separate URL with TYPO3 calendarize markup.
# Date text is noisy ("Sonntag 10.5. 11:00 - 13:00") — dateparser handles it
# via DMY + PREFER_DATES_FROM=future, picking up the year from context.
- id: ruhr-museum-events
  name: Ruhr Museum
  display_name: Ruhr Museum (Veranstaltungen)
  city: Essen
  category: other        # categorized via title keywords (tour/lecture/etc.)
  homepage: https://ruhrmuseum.de
  calendar_url: https://ruhrmuseum.de/veranstaltungen/kalender
  kind: html_list
  source_priority: 0
  selectors:
    item: "div.calendarize div.state-default"
    title: "h2, h3"           # "Heute" block uses h3, "Folgende Termine" uses h2
    date: "div.bb-4, div.mt-3"  # bb-4 wraps date+location for upcoming; mt-3 for today
    detail_link: "a"
  date_extract_regex: '(?:Mo|Di|Mi|Do|Fr|Sa|So|Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\.?\s+\d{1,2}\.\d{1,2}\.?\s*\d{1,2}:\d{2}'
  notes: |
    TYPO3 calendarize extension. Each .state-default is one occurrence.
    Page renders two blocks under one selector: "Heute" (h3 title, div.mt-3
    holding "<location><br><weekday> DD.MM. HH:MM") and "Folgende Termine"
    (h2 title, div.bb-4 wrapping "<weekday> DD.MM. HH:MM" and location).
    Comma selectors match both layouts; date_extract_regex isolates just
    the "<weekday> DD.MM. HH:MM" portion before dateparser sees it.
    No year in source — dateparser infers from PREFER_DATES_FROM=future.
    Recurring events (Doppelschicht tours) get rolled up by the merger.

