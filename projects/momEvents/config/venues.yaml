  kind: static
  source_priority: 0
  static_events:
    - title: "Light-Land-Scapes (Andreas Schmid, Jeongmoon Choi, Yoana Tuzharova, Atelier Rosalie)"
      start: 2025-06-07
      end: 2026-12-31
      detail_url: https://www.lichtkunst-unna.de/de/ausstellungen/
      description: "Aktuelle Wechselausstellung mit Werken zeitgenössischer Lichtkünstler:innen. Andreas Schmid: Lichtungen. Jeongmoon Choi: Floating Horizon. Yoana Tuzharova: Penumbra. Atelier Rosalie / Thomas Jürgens: STREAM I.–III."
  notes: |
    World's only museum dedicated to international light art, carved into
    a former brewery cellar (former Lindenbrauerei). Permanent collection
    + rotating temp exhibitions. The /de/ausstellungen page mixes current
    + archive (28 .slideshow_textwrapper entries) with no machine-readable
    dates per item — hardcoded current temp show keeps ZIL visible to mum.
    Refresh manually when a new temp exhibition opens (check
    /de/ausstellungen #aktuelle-ausstellung).

