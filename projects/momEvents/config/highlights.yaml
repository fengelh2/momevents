# ─── Manual flags for things keywords would miss ─────────────────────────────
# Use venue_id + a fuzzy title match. `until:` is the show's closing date — the
# entry auto-expires after that, so this list won't bit-rot.
#
# Format:
#   - venue_id: <id from venues.yaml>
#     title_match: "<exact or near-exact title>"
#     until: YYYY-MM-DD
#     note: "<short editorial line shown on the highlight card>"

featured_events: []
