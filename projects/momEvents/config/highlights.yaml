# momEvents — featured / "must-see" highlights
#
# An event is flagged as featured if EITHER:
#   1. its title (or description) contains any string from `featured_keywords` (case-insensitive substring), OR
#   2. it matches an entry in `featured_events` (venue_id + title fuzzy match >= 85)
#
# Featured events appear pinned at the top of events.html in a "Nicht verpassen"
# section AND get a ★ badge inline within their week.
#
# The pinned section is sorted by closing-date-soonest-first (creates urgency,
# surfaces things that are about to end). Hard cap: 4 entries.
#
# Updates are welcome — when mum mentions an artist or composer she wants to be
# alerted about, add to featured_keywords. When she tells us about a specific
# show ahead of time, add to featured_events.

# ─── Auto-flag by keywords (case-insensitive substring match on title) ───────
# Seed list — covers the canonical "drop everything" names a culturally engaged
# senior would recognize. Curated 2026-05-09. Add to it as needed.

